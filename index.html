<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Video de fondo a pantalla completa */
        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        /* Filtro oscuro para resaltar el brillo neón */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* Contenedor de Cristal */
        .container {
            width: 90%;
            max-width: 1300px;
            background: rgba(20, 20, 25, 0.4);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            z-index: 1;
        }

        /* Altura calculada para 20 asesores sin que se aplasten */
        .chart-wrapper {
            position: relative;
            height: 80vh; 
            min-height: 1000px; 
            width: 100%;
        }

        /* Efecto Neón Global al lienzo */
        #rankingVentas {
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.25));
        }

        /* Animación del Título */
        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3.5em;
            letter-spacing: 3px;
            margin-bottom: 50px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // --- 1. BASE DE DATOS DEL EQUIPO ---
        // Aquí ingresas a tu gente. No importa el orden, el sistema los ordenará solos.
        const asesoresBase = [
            { nombre: 'VALERIA V', ventas: 14 },
            { nombre: 'FABIAN', ventas: 10 },
            { nombre: 'EVA', ventas: 26 },
            { nombre: 'VALERIA M', ventas: 22 },
            { nombre: 'JOMAJAIRA', ventas: 21 },
            { nombre: 'ROMINA', ventas: 19 },
            { nombre: 'JOSEPH', ventas: 15 },
            { nombre: 'DIEGO', ventas: 14 },
            { nombre: 'BRIANNA', ventas: 12 },
            { nombre: 'ALVARO', ventas: 10 },
            { nombre: 'FRANKI', ventas: 9 },
            { nombre: 'ALBERT', ventas: 8 },
            { nombre: 'KENNY', ventas: 5 },
            { nombre: 'KIMBERLY', ventas: 4 },
            { nombre: 'ISABELLE', ventas: 3 },
            { nombre: 'HENRY', ventas: 2 },
            { nombre: 'LEONARDO C', ventas: 5 },
            { nombre: 'LEONARDO Y', ventas: 6 },
            { nombre: 'ARMANDO', ventas: 1 },
            { nombre: 'PEDRO', ventas: 2 }
        ];

        // --- 2. MOTOR DE ORDENAMIENTO AUTOMÁTICO ---
        // Ordena de mayor a menor ventas
        asesoresBase.sort((a, b) => b.ventas - a.ventas);

        // --- 3. ASIGNACIÓN DE INSIGNIAS Y EXTRACCIÓN DE DATOS ---
        const nombresConInsignia = asesoresBase.map((as, index) => {
            if (index === 0) return '👑 ' + as.nombre;
            if (index === 1) return '🥈 ' + as.nombre;
            if (index === 2) return '🥉 ' + as.nombre;
            return as.nombre;
        });

        const ventasOrdenadas = asesoresBase.map(as => as.ventas);

        // --- 4. LÓGICA DE COLORES NEÓN SEGÚN OBJETIVOS (20, 25, 30) ---
        const coloresFondo = ventasOrdenadas.map(v => {
            if (v >= 30) return 'rgba(255, 215, 0, 0.8)';   // ORO 
            if (v >= 25) return 'rgba(0, 255, 127, 0.8)';   // VERDE 
            if (v >= 20) return 'rgba(0, 191, 255, 0.8)';   // AZUL 
            return 'rgba(138, 43, 226, 0.6)';               // MORADO 
        });

        const coloresBorde = ventasOrdenadas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#8A2BE2';
        });

        const coloresTextoY = ventasOrdenadas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#E066FF';
        });

        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        let delayed;

        // --- 5. RENDERIZADO DEL GRÁFICO ---
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombresConInsignia,
                datasets: [{
                    label: 'Ventas Logradas',
                    data: ventasOrdenadas,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 10,
                    borderSkipped: false,
                    barPercentage: 0.7
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false,
                
                // Animación en cascada fluida
                animation: {
                    onComplete: () => { delayed = true; },
                    delay: (context) => {
                        let delay = 0;
                        if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 150; 
                        }
                        return delay;
                    },
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.9)',
                        titleFont: { size: 16, weight: 'bold' },
                        bodyFont: { size: 14 },
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            label: (context) => ` Logro: ${context.raw} ventas`
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 35, // El techo es 35 para que 30 (Oro) se vea gigante
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.08)',
                            drawBorder: false
                        },
                        ticks: { 
                            color: '#bbbbbb',
                            font: { size: 14 },
                            stepSize: 5 
                        }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { 
                            color: coloresTextoY, 
                            font: { size: 17, weight: 'bold' },
                            padding: 15
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
