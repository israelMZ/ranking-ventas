<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 1300px;
            background: rgba(20, 20, 25, 0.4);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-wrapper {
            position: relative;
            height: 80vh; 
            min-height: 1000px; 
            width: 100%;
        }

        #rankingVentas {
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.25));
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3.5em;
            letter-spacing: 3px;
            margin-bottom: 30px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }

        .btn-estadisticas {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background: rgba(0, 191, 255, 0.2);
            border: 2px solid #00BFFF;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        .btn-estadisticas:hover {
            background: #00BFFF;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.8);
            transform: scale(1.05);
        }

        #modalStats {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #modalStats.mostrar {
            display: flex;
            opacity: 1;
        }

        .modal-contenido {
            background: rgba(30, 30, 40, 0.6);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 127, 0.2);
            position: relative;
        }

        .modal-titulo {
            color: #00FF7F;
            font-size: 2.5em;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 0 0 20px #00FF7F;
        }

        .stats-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 180px;
        }

        .stat-valor {
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 1.2em;
            color: #bbbbbb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-ingresadas { color: #00BFFF; text-shadow: 0 0 20px #00BFFF; }
        .color-caidas { color: #FF4500; text-shadow: 0 0 20px #FF4500; }
        .color-cobertura { color: #FFD700; text-shadow: 0 0 20px #FFD700; }

        .btn-cerrar {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 2em;
            color: white;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .btn-cerrar:hover { color: #FF4500; }

    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <button id="btnAbrirStats" class="btn-estadisticas">📊 Rendimiento Global</button>
    </div>

    <div id="modalStats">
        <div class="modal-contenido">
            <span id="btnCerrarStats" class="btn-cerrar">✖</span>
            <h2 class="modal-titulo">RENDIMIENTO GLOBAL DEL EQUIPO</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Ingresadas</div>
                    <div id="valIngresadas" class="stat-valor color-ingresadas">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Caídas</div>
                    <div id="valCaidas" class="stat-valor color-caidas">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Cobertibilidad</div>
                    <div id="valCobertura" class="stat-valor color-cobertura">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // --- 1. BASE DE DATOS DETALLADA POR ASESOR ---
        // Ahora ingresas las 'ventas' (aprobadas) y las 'caidas' individualmente
        const asesoresBase = [
            { nombre: 'VALERIA V', ventas: 32, caidas: 4 },
            { nombre: 'FABIAN', ventas: 28, caidas: 6 },
            { nombre: 'EVA', ventas: 26, caidas: 2 },
            { nombre: 'VALERIA M', ventas: 22, caidas: 5 },
            { nombre: 'JOMAJAIRA', ventas: 21, caidas: 3 },
            { nombre: 'ROMINA', ventas: 19, caidas: 8 },
            { nombre: 'JOSEPH', ventas: 15, caidas: 1 },
            { nombre: 'DIEGO', ventas: 14, caidas: 2 },
            { nombre: 'BRIANNA', ventas: 12, caidas: 4 },
            { nombre: 'ALVARO', ventas: 10, caidas: 0 },
            { nombre: 'FRANKI', ventas: 9, caidas: 1 },
            { nombre: 'ALBERT', ventas: 8, caidas: 2 },
            { nombre: 'KENNY', ventas: 5, caidas: 0 },
            { nombre: 'KIMBERLY', ventas: 4, caidas: 3 },
            { nombre: 'ISABELLE', ventas: 3, caidas: 1 },
            { nombre: 'HENRY', ventas: 2, caidas: 0 },
            { nombre: 'LEONARDO C', ventas: 5, caidas: 2 },
            { nombre: 'LEONARDO Y', ventas: 6, caidas: 1 },
            { nombre: 'ARMANDO', ventas: 1, caidas: 4 },
            { nombre: 'PEDRO', ventas: 2, caidas: 1 }
        ];

        // --- 2. CÁLCULOS GLOBALES AUTOMÁTICOS ---
        const totalAprobadas = asesoresBase.reduce((suma, as) => suma + as.ventas, 0);
        const totalCaidas = asesoresBase.reduce((suma, as) => suma + as.caidas, 0);
        const totalIngresadas = totalAprobadas + totalCaidas;
        
        let cobertibilidadGlobal = 0;
        if (totalIngresadas > 0) {
            cobertibilidadGlobal = ((totalAprobadas / totalIngresadas) * 100).toFixed(1);
        }

        // Insertar los cálculos en el panel HTML
        document.getElementById('valIngresadas').innerText = totalIngresadas;
        document.getElementById('valCaidas').innerText = totalCaidas;
        document.getElementById('valCobertura').innerText = cobertibilidadGlobal + '%';

        // Gestión del Modal
        const modal = document.getElementById('modalStats');
        document.getElementById('btnAbrirStats').addEventListener('click', () => modal.classList.add('mostrar'));
        document.getElementById('btnCerrarStats').addEventListener('click', () => modal.classList.remove('mostrar'));

        // --- 3. MOTOR DE ORDENAMIENTO (Por Ventas Aprobadas) ---
        asesoresBase.sort((a, b) => b.ventas - a.ventas);

        const nombresConInsignia = asesoresBase.map((as, index) => {
            if (index === 0) return '👑 ' + as.nombre;
            if (index === 1) return '🥈 ' + as.nombre;
            if (index === 2) return '🥉 ' + as.nombre;
            return as.nombre;
        });

        const ventasOrdenadas = asesoresBase.map(as => as.ventas);

        // --- 4. COLORES ---
        const coloresFondo = ventasOrdenadas.map(v => {
            if (v >= 30) return 'rgba(255, 215, 0, 0.8)';   // ORO
            if (v >= 25) return 'rgba(0, 255, 127, 0.8)';   // VERDE
            if (v >= 20) return 'rgba(0, 191, 255, 0.8)';   // AZUL
            return 'rgba(138, 43, 226, 0.6)';               // MORADO
        });

        const coloresBorde = ventasOrdenadas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#8A2BE2';
        });

        const coloresTextoY = ventasOrdenadas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#E066FF';
        });

        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        let delayed;

        // --- 5. RENDERIZADO DEL GRÁFICO ---
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombresConInsignia,
                datasets: [{
                    label: 'Ventas Logradas',
                    data: ventasOrdenadas,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 10,
                    borderSkipped: false,
                    barPercentage: 0.7
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    onComplete: () => { delayed = true; },
                    delay: (context) => {
                        let delay = 0;
                        if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 150; 
                        }
                        return delay;
                    },
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.95)',
                        titleFont: { size: 18, weight: 'bold' },
                        bodyFont: { size: 15 },
                        padding: 15,
                        displayColors: false,
                        // --- ESTADÍSTICAS INDIVIDUALES AL PASAR EL RATÓN ---
                        callbacks: {
                            label: function(context) {
                                const index = context.dataIndex;
                                const aprobadas = asesoresBase[index].ventas;
                                const caidas = asesoresBase[index].caidas;
                                const ingresadas = aprobadas + caidas;
                                let efectividad = 0;
                                if (ingresadas > 0) {
                                    efectividad = ((aprobadas / ingresadas) * 100).toFixed(1);
                                }
                                
                                return [
                                    ` ✅ Aprobadas: ${aprobadas}`,
                                    ` ❌ Caídas: ${caidas}`,
                                    ` 📊 Efectividad: ${efectividad}%`
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 35, 
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.08)',
                            drawBorder: false
                        },
                        ticks: { color: '#bbbbbb', font: { size: 14 }, stepSize: 5 }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: coloresTextoY, font: { size: 17, weight: 'bold' }, padding: 15 }
                    }
                }
            }
        });
    </script>
</body>
</html>
