<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite - LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body { margin: 0; padding: 40px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .video-fondo { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 90%; max-width: 1300px; background: rgba(20, 20, 25, 0.4); padding: 40px; border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); z-index: 1; display: flex; flex-direction: column; align-items: center;
        }

        .chart-wrapper { position: relative; height: 80vh; min-height: 1000px; width: 100%; }
        #rankingVentas { filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.25)); }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { color: #FFD700; text-align: center; z-index: 1; font-size: 3.5em; letter-spacing: 3px; margin-bottom: 30px; animation: flotarYBrillar 3s ease-in-out infinite; }

        /* --- BOTÓN --- */
        .btn-estadisticas {
            margin-top: 30px; padding: 15px 40px; font-size: 1.2em; font-weight: bold; color: white;
            background: rgba(0, 191, 255, 0.2); border: 2px solid #00BFFF; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }
        .btn-estadisticas:hover { background: #00BFFF; box-shadow: 0 0 30px rgba(0, 191, 255, 0.8); transform: scale(1.05); }

        /* --- PANEL MODAL --- */
        #modalStats {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); z-index: 999;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; padding: 20px; box-sizing: border-box;
        }
        #modalStats.mostrar { display: flex; opacity: 1; }

        .modal-contenido {
            background: rgba(20, 20, 25, 0.8); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 1500px; max-height: 90vh; display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.2);
        }

        .modal-titulo { color: #00BFFF; font-size: 2em; margin-top: 0; margin-bottom: 30px; text-align: center; text-shadow: 0 0 15px #00BFFF; }
        .btn-cerrar { position: absolute; top: 20px; right: 30px; font-size: 2em; color: white; cursor: pointer; transition: color 0.3s ease; }
        .btn-cerrar:hover { color: #FF4500; }

        /* --- TABLA EXCEL NEÓN --- */
        .contenedor-tabla { overflow-x: auto; overflow-y: auto; flex-grow: 1; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; white-space: nowrap; }
        th { padding: 15px; font-size: 14px; letter-spacing: 1px; color: white; background: rgba(0,0,0,0.6); position: sticky; top: 0; z-index: 2; border-bottom: 2px solid rgba(255,255,255,0.2); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; font-size: 15px; }
        tr:hover td { filter: brightness(1.5); }
        
        .col-asesor { background: rgba(50, 50, 50, 0.4); text-align: left; padding-left: 20px; }
        .col-naranja { background: rgba(255, 140, 0, 0.15); color: #FFB04F; } 
        .col-rojo { background: rgba(255, 69, 0, 0.15); color: #FF6347; }    
        .col-azul { background: rgba(0, 191, 255, 0.15); color: #00BFFF; }   
        .col-verde { background: rgba(50, 205, 50, 0.15); color: #32CD32; }  
        .border-right { border-right: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <button id="btnAbrirStats" class="btn-estadisticas">📊 TABLA DE DESGLOSE EN VIVO</button>
    </div>

    <div id="modalStats">
        <div class="modal-contenido">
            <span id="btnCerrarStats" class="btn-cerrar">✖</span>
            <h2 class="modal-titulo">REPORTE DETALLADO DEL EQUIPO </h2>

            <div class="contenedor-tabla">
                <table>
                    <thead>
                        <tr>
                            <th class="col-asesor border-right">ASESOR</th>
                            <th class="col-naranja border-right">INGRESOS</th>
                            <th class="col-rojo">CANC. CLIENTE</th>
                            <th class="col-rojo border-right">CANC. OP</th>
                            <th class="col-azul border-right">PROGRAMADA</th>
                            <th class="col-verde border-right">INSTALADAS</th>
                            <th class="col-naranja border-right">TOTAL</th>
                            <th class="col-naranja">CONVERTIBILIDAD</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';

        let miGrafico = null;

        async function cargarDatos() {
            try {
                const respuesta = await fetch(URL_SHEET);
                const dataRaw = await respuesta.text();
                
                const filas = dataRaw.split('\n').slice(1); 
                
                // LÓGICA ANTI-DUPLICADOS
                let asesoresMap = new Map();

                filas.forEach(linea => {
                    const c = linea.replace(/\r/g, '').split(','); 
                    
                    if(c.length < 6 || c[0].trim() === '' || c[0].trim().toUpperCase() === 'ASESOR') return; 
                    
                    const nombre = c[0].trim();
                    const ingresos = parseInt(c[1]) || 0;
                    const cancCliente = parseInt(c[2]) || 0;
                    const cancOp = parseInt(c[3]) || 0;
                    const programada = parseInt(c[4]) || 0;
                    const instaladas = parseInt(c[5]) || 0;

                    asesoresMap.set(nombre, { nombre, ingresos, cancCliente, cancOp, programada, instaladas });
                });

                let asesoresUnicos = Array.from(asesoresMap.values());

                // Ordenar por instaladas de mayor a menor
                asesoresUnicos.sort((a, b) => b.instaladas - a.instaladas);

                llenarTabla(asesoresUnicos);
                dibujarGrafico(asesoresUnicos);

            } catch (error) {
                console.error("Error cargando Google Sheets:", error);
                alert("Error de conexión. Verifica el documento en Google Sheets.");
            }
        }

        // --- FUNCIÓN PARA LLENAR LA TABLA ---
        function llenarTabla(asesores) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = '';
            asesores.forEach(as => {
                const totalCalculado = as.cancCliente + as.cancOp + as.programada + as.instaladas;
                const convertibilidad = as.ingresos > 0 ? ((as.instaladas / as.ingresos) * 100).toFixed(2) : "0.00";
                
                cuerpo.innerHTML += `
                    <tr>
                        <td class="col-asesor border-right">${as.nombre}</td>
                        <td class="col-naranja border-right">${as.ingresos}</td>
                        <td class="col-rojo">${as.cancCliente}</td>
                        <td class="col-rojo border-right">${as.cancOp}</td>
                        <td class="col-azul border-right">${as.programada}</td>
                        <td class="col-verde border-right">${as.instaladas}</td>
                        <td class="col-naranja border-right">${totalCalculado}</td>
                        <td class="col-naranja">${convertibilidad} %</td>
                    </tr>`;
            });
        }

        // --- FUNCIÓN PARA DIBUJAR EL GRÁFICO ---
        function dibujarGrafico(asesores) {
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            
            const nombresInsignia = asesores.map((as, i) => {
                if (i === 0) return '👑 ' + as.nombre;
                if (i === 1) return '🥈 ' + as.nombre;
                if (i === 2) return '🥉 ' + as.nombre;
                return as.nombre;
            });

            const ventas = asesores.map(as => as.instaladas);

            const colores = ventas.map(v => v >= 10 ? 'rgba(255, 215, 0, 0.8)' : v >= 7 ? 'rgba(0, 255, 127, 0.8)' : v >= 4 ? 'rgba(0, 191, 255, 0.8)' : 'rgba(138, 43, 226, 0.6)');
            const bordes = ventas.map(v => v >= 10 ? '#FFD700' : v >= 7 ? '#00FF7F' : v >= 4 ? '#00BFFF' : '#8A2BE2');
            const coloresTxt = ventas.map(v => v >= 10 ? '#FFD700' : v >= 7 ? '#00FF7F' : v >= 4 ? '#00BFFF' : '#E066FF');

            Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
            let delayed;

            if (miGrafico) { miGrafico.destroy(); }

            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: nombresInsignia,
                    datasets: [{
                        label: 'Ventas Instaladas',
                        data: ventas,
                        backgroundColor: colores,
                        borderColor: bordes,
                        borderWidth: 2,
                        borderRadius: 10,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    animation: {
                        onComplete: () => { delayed = true; },
                        delay: (context) => {
                            let delay = 0;
                            if (context.type === 'data' && context.mode === 'default' && !delayed) { delay = context.dataIndex * 150; }
                            return delay;
                        },
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.95)', titleFont: { size: 18, weight: 'bold' }, bodyFont: { size: 15 }, padding: 15, displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    const as = asesores[context.dataIndex];
                                    const conv = as.ingresos > 0 ? ((as.instaladas / as.ingresos) * 100).toFixed(1) : "0.0";
                                    return [
                                        ` ✅ Instaladas: ${as.instaladas}`,
                                        ` 📥 Ingresadas: ${as.ingresos}`,
                                        ` 📊 Convertibilidad: ${conv}%`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        // AQUÍ SE HIZO EL CAMBIO: max: 30
                        x: { beginAtZero: true, max: 30, grid: { color: 'rgba(255,255,255,0.08)', drawBorder: false }, ticks: { color: '#bbbbbb', font: { size: 14 }, stepSize: 5 } },
                        y: { grid: { display: false }, ticks: { color: coloresTxt, font: { size: 15, weight: 'bold' }, padding: 15 } }
                    }
                }
            });
        }

        // --- EVENTOS DEL MODAL ---
        const modal = document.getElementById('modalStats');
        document.getElementById('btnAbrirStats').addEventListener('click', () => modal.classList.add('mostrar'));
        document.getElementById('btnCerrarStats').addEventListener('click', () => modal.classList.remove('mostrar'));

        // --- INICIAR ---
        cargarDatos();
    </script>
</body>
</html>
