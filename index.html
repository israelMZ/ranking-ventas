<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Video de fondo a pantalla completa */
        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        /* Capa oscura sobre el video */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* Panel de Cristal (Glassmorphism) */
        .container {
            width: 85%;
            max-width: 1200px;
            background: rgba(20, 20, 25, 0.4); /* Fondo muy oscuro y transparente */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); /* Sombra suave */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borde blanco casi invisible */
            backdrop-filter: blur(12px); /* El efecto de cristal desenfocado */
            z-index: 1;
        }

        /* Animación del Título */
        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-8px); text-shadow: 0 0 25px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3em;
            letter-spacing: 2px;
            margin-bottom: 40px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>
    
    <div class="container">
        <canvas id="rankingVentas" height="100"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // Datos de tu equipo
        const nombres = ['Sasha', 'Jeyko', 'Rickson', 'Italo', 'Isabelle'];
        const porcentajes = [120, 95, 82, 70, 45]; 

        // Paleta de Colores: Verde Esmeralda (Top) y Morado Neón (Resto)
        const coloresFondo = porcentajes.map(p => p >= 80 ? 'rgba(0, 255, 127, 0.7)' : 'rgba(138, 43, 226, 0.7)');
        const coloresBorde = porcentajes.map(p => p >= 80 ? '#00FF7F' : '#8A2BE2');

        // Configuración global de la fuente para que se vea más profesional
        Chart.defaults.color = '#ffffff';
        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: '% Logrado',
                    data: porcentajes,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 8, // Bordes redondeados en las barras
                    borderSkipped: false,
                    barPercentage: 0.6 // Hace las barras un poco más delgadas y elegantes
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                // Animación en cascada
                animation: {
                    duration: 1500,
                    delay: (context) => context.dataIndex * 300 
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleFont: { size: 16 },
                        bodyFont: { size: 14 },
                        padding: 12,
                        displayColors: false
