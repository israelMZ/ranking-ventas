<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            width: 85%;
            max-width: 1200px;
            background: rgba(20, 20, 25, 0.4);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            z-index: 1;
        }

        /* Envoltorio de seguridad para que el gráfico NUNCA desaparezca */
        .chart-wrapper {
            position: relative;
            height: 60vh; /* Ocupa el 60% de la altura de la pantalla */
            min-height: 400px; /* Pero nunca será menor a 400px */
            width: 100%;
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-8px); text-shadow: 0 0 25px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3em;
            letter-spacing: 2px;
            margin-bottom: 40px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        const nombres = ['VALERIA V', 'FABIAN', 'EVA', 'VALERIA M', 'JOMAJAIRA', 'ROMINA', 'JOSEPH','DIEGO','BRIANNA','ALVARO','FRANKI','ALBERT','KENNY','KIMBERLY'];
        const porcentajes = [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10]; 

        const coloresFondo = porcentajes.map(p => p >= 80 ? 'rgba(0, 255, 127, 0.7)' : 'rgba(138, 43, 226, 0.7)');
        const coloresBorde = porcentajes.map(p => p >= 80 ? '#00FF7F' : '#8A2BE2');

        Chart.defaults.color = '#ffffff';
        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        // Variable segura para controlar la animación
        let delayed;

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: '% Logrado',
                    data: porcentajes,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 8,
                    borderSkipped: false,
                    barPercentage: 0.6
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false, // Fundamental para que respete nuestro chart-wrapper
                
                // Lógica de Animación Reparada y Blindada
                animation: {
                    onComplete: () => {
                        delayed = true;
                    },
                    delay: (context) => {
                        let delay = 0;
                        // Validamos estrictamente que solo aplique el retraso a las barras (data)
                        if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 300; 
                        }
                        return delay;
                    },
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleFont: { size: 16 },
                        bodyFont: { size: 14 },
                        padding: 12,
                        displayColors: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 150,
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.05)',
                            drawBorder: false
                        },
                        ticks: { 
                            color: '#aaaaaa',
                            font: { size: 14 }
                        }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { 
                            color: 'white', 
                            font: { size: 18, weight: 'bold' } 
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
