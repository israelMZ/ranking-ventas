<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Video de fondo a pantalla completa */
        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        /* Capa de oscuridad para resaltar el neón */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* Contenedor de Cristal */
        .container {
            width: 90%;
            max-width: 1300px;
            background: rgba(20, 20, 25, 0.4);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            z-index: 1;
        }

        /* Espacio para los 20 asesores (Ajustado a 1000px de altura mínima) */
        .chart-wrapper {
            position: relative;
            height: 80vh; 
            min-height: 1000px; 
            width: 100%;
        }

        /* Efecto de resplandor neón en todo el gráfico */
        #rankingVentas {
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.2));
        }

        /* Animación del Título Principal */
        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3.5em;
            letter-spacing: 3px;
            margin-bottom: 50px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // --- SECCIÓN DE DATOS (Aquí actualizas nombres y ventas) ---
        const nombres = [
            'VALERIA V', 'FABIAN', 'EVA', 'VALERIA M', 'JOMAJAIRA', 
            'ROMINA', 'JOSEPH', 'DIEGO', 'BRIANNA', 'ALVARO', 
            'FRANKI', 'ALBERT', 'KENNY', 'KIMBERLY', 'ISABELLE', 
            'HENRY', 'LEONARDO C', 'LEONARDO Y', 'ARMANDO', 'PEDRO'
        ];
        
        // Ventas actuales (Escala de 0 a 30+)
        const ventas = [32, 28, 26, 22, 21, 19, 15, 14, 12, 10, 9, 8, 5, 4, 3, 2, 5, 6, 1, 2]; 

        // --- LÓGICA DE ESCALAS Y COLORES NEÓN ---
        const coloresFondo = ventas.map(v => {
            if (v >= 30) return 'rgba(255, 215, 0, 0.8)';   // ORO (Objetivo 3)
            if (v >= 25) return 'rgba(0, 255, 127, 0.8)';   // VERDE (Objetivo 2)
            if (v >= 20) return 'rgba(0, 191, 255, 0.8)';   // AZUL (Objetivo 1)
            return 'rgba(138, 43, 226, 0.6)';               // MORADO (En camino)
        });

        const coloresBorde = ventas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#8A2BE2';
        });

        // Colores Neón para los Nombres (Eje Y)
        const coloresTextoY = ventas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#E066FF';
        });

        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        let delayed;

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: 'Ventas Logradas',
                    data: ventas,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 10,
                    borderSkipped: false,
                    barPercentage: 0.7
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false,
                
                // Animación en Cascada (Staggered Load)
                animation: {
                    onComplete: () => { delayed = true; },
                    delay: (context) => {
                        let delay = 0;
                        if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 150; 
                        }
                        return delay;
                    },
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.9)',
                        titleFont: { size: 16, weight: 'bold' },
                        bodyFont: { size: 14 },
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            label: (context) => ` Logro: ${context.raw} ventas`
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 35, // Escala máxima para que el 30 sea casi el final
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.08)',
                            drawBorder: false
                        },
                        ticks: { 
                            color: '#bbbbbb',
                            font: { size: 14 },
                            stepSize: 5 
                        }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { 
                            color: coloresTextoY, // Aplicamos los colores neón dinámicos
                            font: { size: 17, weight: 'bold' },
                            padding: 15
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
