<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            width: 80%;
            background: rgba(26, 26, 26, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        /* --- AQUÍ ESTÁ LA MAGIA DE LA ANIMACIÓN --- */
        @keyframes flotarYBrillar {
            0% { 
                transform: translateY(0px); /* Posición original */
                text-shadow: 0 0 10px #FFD700; /* Brillo normal */
            }
            50% { 
                transform: translateY(-10px); /* Sube 10 píxeles */
                text-shadow: 0 0 25px #FFD700, 0 0 15px #FFF; /* Brilla mucho más */
            }
            100% { 
                transform: translateY(0px); /* Vuelve a la posición original */
                text-shadow: 0 0 10px #FFD700; 
            }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 2.5em;
            margin-bottom: 30px;
            /* Aplicamos la animación: dura 3 segundos, es suave (ease-in-out) y se repite infinito */
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>
    
    <div class="container">
        <canvas id="rankingVentas"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // Nombres y porcentajes de tu equipo
        const nombres = ['Sasha', 'Jeyko', 'Rickson', 'Italo', 'Isabelle'];
        const porcentajes = [120, 95, 82, 70, 45]; 

        const colores = porcentajes.map(p => {
            if (p >= 100) return '#FFD700'; // Oro 
            if (p >= 80) return '#00FF7F';  // Verde 
            if (p >= 50) return '#00BFFF';  // Azul 
            return '#FF4500';               // Rojo 
        });

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: '% Logrado',
                    data: porcentajes,
                    backgroundColor: colores,
                    borderRadius: 10,
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y', 
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 150,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'white' }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: 'white', font: { size: 16, weight: 'bold' } }
                    }
                }
            }
        });
    </script>
</body>
</html>
